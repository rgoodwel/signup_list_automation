###############################################################################
# terraform-apply.yml
#
# Applies Terraform for a specific environment.
# Triggered:
#   - Automatically for dev/stage on push to main (after CI passes)
#   - Manually for any environment via workflow_dispatch
#   - Prod requires "prod" GitHub environment with required reviewers
#
# Required GitHub secrets (same as terraform-plan.yml):
#   AWS_ROLE_ARN, TF_STATE_BUCKET, TF_STATE_LOCK_TABLE,
#   TF_VAR_BUCKET_NAME_DEV, TF_VAR_BUCKET_NAME_STAGE, TF_VAR_BUCKET_NAME_PROD
#   AWS_REGION
###############################################################################
name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, stage, prod]
      confirm:
        description: "Type 'apply' to confirm"
        required: true
        default: ""

concurrency:
  group: tf-apply-${{ github.event.inputs.environment || 'auto' }}
  cancel-in-progress: false  # Never cancel in-flight applies

permissions:
  contents: read
  id-token: write

jobs:
  ###########################################################################
  # Determine which envs to apply
  ###########################################################################
  set-matrix:
    name: Set Apply Matrix
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.matrix.outputs.envs }}
    steps:
      - name: Determine environments
        id: matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "envs=[\"${{ github.event.inputs.environment }}\"]" >> $GITHUB_OUTPUT
          else
            # Auto: push to main applies dev, then stage sequentially
            echo "envs=[\"dev\",\"stage\"]" >> $GITHUB_OUTPUT
          fi

  ###########################################################################
  # Validate manual dispatch input
  ###########################################################################
  validate-dispatch:
    name: Validate Dispatch Input
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check confirm
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "apply" ]; then
            echo "::error::You must type 'apply' in the confirm field to proceed."
            exit 1
          fi

  ###########################################################################
  # Apply
  ###########################################################################
  apply:
    name: Apply (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: [set-matrix, validate-dispatch]
    if: |
      always() &&
      (needs.set-matrix.result == 'success') &&
      (needs.validate-dispatch.result == 'success' || needs.validate-dispatch.result == 'skipped')
    strategy:
      fail-fast: true
      max-parallel: 1   # Apply one env at a time
      matrix:
        env: ${{ fromJson(needs.set-matrix.outputs.envs) }}

    # GitHub environment – configure protection rules and reviewers in repo settings
    environment: ${{ matrix.env }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/envs/${{ matrix.env }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="region=${{ secrets.AWS_REGION || 'us-east-1' }}"

      - name: Resolve bucket name for environment
        id: bucket
        run: |
          case "${{ matrix.env }}" in
            dev)   echo "name=${{ secrets.TF_VAR_BUCKET_NAME_DEV }}" >> $GITHUB_OUTPUT ;;
            stage) echo "name=${{ secrets.TF_VAR_BUCKET_NAME_STAGE }}" >> $GITHUB_OUTPUT ;;
            prod)  echo "name=${{ secrets.TF_VAR_BUCKET_NAME_PROD }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Terraform plan (for apply)
        working-directory: infra/envs/${{ matrix.env }}
        run: |
          terraform plan \
            -var="bucket_name=${{ steps.bucket.outputs.name }}" \
            -out=tfplan.binary

      - name: Terraform apply
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform apply -auto-approve tfplan.binary

      - name: Capture outputs
        id: tf-outputs
        working-directory: infra/envs/${{ matrix.env }}
        run: |
          echo "bucket_name=$(terraform output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "site_url=$(terraform output -raw site_url)" >> $GITHUB_OUTPUT

      - name: Save outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs-${{ matrix.env }}-${{ github.sha }}
          path: infra/envs/${{ matrix.env }}/tfplan.binary
          retention-days: 30

    outputs:
      bucket_name: ${{ steps.tf-outputs.outputs.bucket_name }}
      cf_dist_id: ${{ steps.tf-outputs.outputs.cf_dist_id }}
      site_url: ${{ steps.tf-outputs.outputs.site_url }}
