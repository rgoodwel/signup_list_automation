###############################################################################
# terraform-plan.yml
#
# Triggered on pull requests. Runs `terraform plan` for each environment
# and posts the plan summary as a PR comment.
#
# Required GitHub secrets:
#   AWS_ROLE_ARN        – IAM role ARN (from bootstrap output)
#   TF_STATE_BUCKET     – S3 state bucket name
#   TF_STATE_LOCK_TABLE – DynamoDB lock table name
#   TF_VAR_bucket_name  – per-env app S3 bucket name (can be env-specific)
#   AWS_REGION          – (optional, defaults to us-east-1)
###############################################################################
name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-apply.yml"

concurrency:
  group: tf-plan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # Required for OIDC
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, stage, prod]

    environment: ${{ matrix.env }}-plan

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform init
        id: init
        working-directory: infra/envs/${{ matrix.env }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="region=${{ secrets.AWS_REGION || 'us-east-1' }}"

      - name: Resolve bucket name for environment
        id: bucket
        run: |
          case "${{ matrix.env }}" in
            dev)   echo "name=${{ secrets.TF_VAR_BUCKET_NAME_DEV }}" >> $GITHUB_OUTPUT ;;
            stage) echo "name=${{ secrets.TF_VAR_BUCKET_NAME_STAGE }}" >> $GITHUB_OUTPUT ;;
            prod)  echo "name=${{ secrets.TF_VAR_BUCKET_NAME_PROD }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Terraform plan
        id: plan
        working-directory: infra/envs/${{ matrix.env }}
        run: |
          terraform plan \
            -var="bucket_name=${{ steps.bucket.outputs.name }}" \
            -no-color \
            -out=tfplan.binary
          terraform show -no-color tfplan.binary > tfplan.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.existsSync('infra/envs/${{ matrix.env }}/tfplan.txt')
              ? fs.readFileSync('infra/envs/${{ matrix.env }}/tfplan.txt', 'utf8')
              : 'Plan file not found.';
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n...(truncated)...'
              : planOutput;

            const marker = `<!-- tf-plan-${{ matrix.env }} -->`;
            const body = `${marker}
            ### Terraform Plan – \`${{ matrix.env }}\`

            **Init:** ${{ steps.init.outcome }} | **Plan:** ${{ steps.plan.outcome }}

            <details><summary>Plan output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>`;

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
