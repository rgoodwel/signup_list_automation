###############################################################################
# ci.yml – Run on every push/PR
# Runs:
#   1. App build (Vite)
#   2. Terraform fmt check + validate for all environments
#   3. tflint (Terraform linter)
#   4. Checkov (IaC security scanner)
###############################################################################
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ###########################################################################
  # App build
  ###########################################################################
  app-build:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  ###########################################################################
  # Terraform format check
  ###########################################################################
  tf-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/

  ###########################################################################
  # Terraform validate (dev + prod)
  ###########################################################################
  tf-validate:
    name: Terraform Validate (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: tf-fmt
    strategy:
      matrix:
        env: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform init (local backend for validation)
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform validate

  ###########################################################################
  # tflint
  ###########################################################################
  tflint:
    name: tflint (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir:
          - infra/bootstrap
          - infra/modules/static-site
          - infra/envs/dev
          - infra/envs/prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init tflint
        run: tflint --init
        working-directory: ${{ matrix.dir }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run tflint
        run: tflint --format=compact
        working-directory: ${{ matrix.dir }}

  ###########################################################################
  # Checkov – IaC security scan
  ###########################################################################
  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          skip_check: >-
            CKV_AWS_86,
            CKV_AWS_68,
            CKV2_AWS_32

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
